<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaidManager TBC - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">
                    Raid<span class="text-orange-500">Manager</span>
                </h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">TBC Toolchain</p>
            </div>
            <button id="btn-refresh" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 px-4 py-2 rounded text-xs font-bold transition">
                ACTUALISER ↻
            </button>
        </header>

        <section id="admin-panel" class="mb-10 p-6 bg-slate-900/50 border border-slate-800 rounded-2xl">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h2 class="text-lg font-black uppercase italic text-white">Création Rapide</h2>
                    <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Presets TBC - 2 Clics</p>
                </div>

                <div class="flex flex-wrap gap-3">
                    <button onclick="Admin.prepareRaid('kz')" class="flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-bold text-xs transition">
                        <span>🏰</span> KARAZHAN
                    </button>
                    <button onclick="Admin.prepareRaid('gruul')" class="flex items-center gap-2 bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-bold text-xs transition">
                        <span>👹</span> GRUUL / MAG
                    </button>
                </div>
            </div>

            <div id="creation-confirm" class="hidden mt-6 pt-6 border-t border-slate-800 animate-fade-in">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase italic">Date du Raid</label>
                        <input type="date" id="input-raid-date" class="bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:border-orange-500 outline-none transition">
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase italic">Heure</label>
                        <input type="time" id="input-raid-time" value="20:30" class="bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:border-orange-500 outline-none transition">
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase italic">Raid Lead</label>
                        <input type="text" id="input-raid-suffix" placeholder="Nom du Raid Lead" class="bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:border-orange-500 outline-none transition">
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-orange-500 uppercase italic">ID Salon Discord</label>
                        <input type="text" id="input-raid-channel-id" placeholder="ID Salon" class="bg-slate-950 border border-orange-900/50 rounded px-3 py-2 text-sm text-white focus:border-orange-500 outline-none transition font-mono">
                    </div>

                    <div class="flex items-center gap-2">
                        <button id="btn-confirm-create" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-lg font-black text-xs transition h-[38px] uppercase tracking-tighter">
                            Confirmer
                        </button>
                        <button onclick="Admin.cancel()" class="text-slate-500 hover:text-white text-[10px] font-bold uppercase tracking-widest px-2">
                            Annuler
                        </button>
                    </div>

                </div>
            </div>
        </section>

        <section id="view-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </section>

        <section id="view-details" class="hidden">
            <button id="btn-back" class="mb-8 text-slate-500 hover:text-orange-500 text-sm flex items-center gap-2 transition font-bold uppercase tracking-tighter">
                ← Retour au calendrier
            </button>
            
            <div id="raid-info" class="mb-10"></div>

            <div class="tabs mb-8 border-b border-slate-800 flex gap-8">
                <button class="tab-link active" data-tab="signups">Inscriptions</button>
                <button class="tab-link" data-tab="comp">Composition</button>
            </div>

            <div id="tab-content-signups" class="tab-panel">
                <div id="signups-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
            </div>

            <div id="tab-content-comp" class="tab-panel hidden">
                <div id="comp-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4"></div>
            </div>
        </section>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
