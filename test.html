<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Call Comp V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: monospace; }
        pre { background: #000; padding: 15px; border: 1px solid #1e293b; color: #10b981; overflow: auto; max-height: 500px; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-xl font-black text-orange-500 mb-6 uppercase">Test Endpoint /comps/</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="compId" placeholder="ID de la compo (ex: 123456...)" 
                   class="bg-slate-900 border border-slate-700 p-2 rounded w-full outline-none focus:border-orange-500">
            <button onclick="runTest()" class="bg-white text-black px-4 py-2 font-bold rounded">FETCH</button>
        </div>

        <div id="res-status" class="mb-4 font-bold"></div>
        <pre id="json-output">Le résultat s'affichera ici...</pre>
    </div>

    <script>
        const API_KEY = "lKi0h04H9wHAHkElRrcNS6hPvYFo92fPHK7YRCGn";
        const PROXY = "https://corsproxy.io/?";

        async function runTest() {
            const compId = document.getElementById('compId').value;
            const output = document.getElementById('json-output');
            const status = document.getElementById('res-status');

            if(!compId) return alert("Besoin du COMPID !");

            try {
                // Utilisation de l'URL que tu as trouvée
                const url = `https://raid-helper.xyz/api/v4/comps/${compId}`;
                
                const res = await fetch(PROXY + encodeURIComponent(url), {
                    headers: { "Authorization": API_KEY }
                });

                const data = await res.json();
                status.innerText = "Statut: " + res.status;
                output.textContent = JSON.stringify(data, null, 4);
                
                console.log("Données de la compo:", data);
            } catch (e) {
                status.innerText = "Erreur !";
                output.textContent = e.message;
            }
        }
    </script>
</body>
</html>
